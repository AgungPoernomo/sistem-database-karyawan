<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satoria - Executive Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @custom-variant dark (&:is(.dark *));

        body { font-family: 'Space Grotesk', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        ::-webkit-scrollbar-thumb:hover { background: #0ea5e9; }

        /* --- SPATIAL GRID BACKGROUND (Kontras Diperkuat) --- */
        .spatial-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            /* Opasitas dinaikkan ke 0.15 dan garis dipertegas */
            background-image: 
                linear-gradient(to right, rgba(14, 165, 233, 0.15) 1px, transparent 1px), 
                linear-gradient(to bottom, rgba(14, 165, 233, 0.15) 1px, transparent 1px);
            background-size: 50px 50px;
            /* Area pandang grid diperluas agar tidak terlalu cepat memudar di pinggir */
            mask-image: radial-gradient(ellipse 100% 100% at 50% 50%, black 40%, transparent 90%);
            -webkit-mask-image: radial-gradient(ellipse 100% 100% at 50% 50%, black 40%, transparent 90%);
            transform: perspective(600px) rotateX(60deg) translateY(-100px) scale(3);
            /* Diperlambat menjadi 15s agar terasa seperti radar elegan, bukan lampu disko */
            animation: gridMove 5s linear infinite;
        }
        /* Efek Glow tambahan untuk Grid di Mode Gelap */
        .dark .spatial-grid {
            background-image: 
                linear-gradient(to right, rgba(56, 189, 248, 0.15) 1px, transparent 1px), 
                linear-gradient(to bottom, rgba(56, 189, 248, 0.15) 1px, transparent 1px);
            filter: drop-shadow(0 0 2px rgba(14, 165, 233, 0.5));
        }
        @keyframes gridMove {
            0% { transform: perspective(600px) rotateX(60deg) translateY(0) scale(3); }
            100% { transform: perspective(600px) rotateX(60deg) translateY(50px) scale(3); }
        }

        /* --- SPATIAL ISLAND (Kaca Dipertajam) --- */
        .spatial-island {
            /* Mode Terang: Inner shadow putih diperkuat, outer shadow lebih gelap */
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0.4) 100%);
            backdrop-filter: blur(30px) saturate(200%); -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-top: 1.5px solid rgba(255, 255, 255, 1); border-left: 1.5px solid rgba(255, 255, 255, 0.9); 
            border-right: 1px solid rgba(255, 255, 255, 0.3); border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 
                0 25px 50px -12px rgba(14, 165, 233, 0.15), 
                inset 0 0 25px rgba(255, 255, 255, 1);
        }
        .dark .spatial-island {
            /* Mode Gelap: Garis atas Cyan menyala, background lebih pekat */
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(2, 6, 23, 0.6) 100%);
            border-top: 1.5px solid rgba(14, 165, 233, 0.5); border-left: 1px solid rgba(14, 165, 233, 0.3); 
            border-right: 1px solid rgba(255, 255, 255, 0.05); border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.8), 
                inset 0 2px 20px rgba(14, 165, 233, 0.15);
        }

        .bar-animate { animation: growBar 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: left; transform: scaleX(0); }
        @keyframes growBar { to { transform: scaleX(1); } }
        
        .modal-overlay { background: rgba(2, 6, 23, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); transition: opacity 0.5s ease; }
        .modal-content { transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        .no-transitions * {
            transition: none !important;
            animation: none !important;
        }
    </style>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('satoria_theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>
</head>
<body id="app-body" class="opacity-0 transition-opacity duration-700 ease-out bg-[#e1e4e7] text-slate-800 dark:bg-slate-950 dark:text-slate-300 h-screen flex overflow-hidden antialiased relative selection:bg-cyan-500 selection:text-white">

    <div class="spatial-grid"></div>

    <div id="app-sidebar" class="z-30 h-full flex-shrink-0 w-[316px] hidden lg:block"></div>

    <main class="relative z-10 flex-1 flex flex-col h-full overflow-hidden">
        
        <div id="app-header"></div>

        <div class="flex-1 overflow-y-auto px-3 md:px-6 pb-4 md:pb-6 pt-2 custom-scrollbar flex flex-col gap-4 md:gap-6">
            <!-- Grid otomatis jadi 1 kolom di HP, 3 kolom di Laptop -->
            <div id="topModulesContainer" class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6"></div>
            
            <div id="widgetContainer" class="mb-1 md:mb-2"></div>
            
            <!-- Tabel dibuat responsif dengan overflow-x-auto -->
            <div id="tableContainer" class="spatial-island rounded-3xl md:rounded-[2.5rem] flex flex-col min-h-[500px] md:min-h-[600px] h-auto overflow-hidden z-20 relative mb-8"></div>
        </div>
    </main>

    <div id="app-modal"></div>

    <script type="module" src="/src/pages/dashboardController.js"></script>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => { 
                document.getElementById('app-body').classList.remove('opacity-0'); 
            }, 150); 
        });
    </script>
</body>
</html>
