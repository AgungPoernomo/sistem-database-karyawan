<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satoria - Data Recovery Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @custom-variant dark (&:is(.dark *));

        body { font-family: 'Space Grotesk', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #f59e0b; }

        /* --- SPATIAL GRID BACKGROUND (Amber Edition) --- */
        .spatial-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: 
                linear-gradient(to right, rgba(245, 158, 11, 0.15) 1px, transparent 1px), 
                linear-gradient(to bottom, rgba(245, 158, 11, 0.15) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(ellipse 100% 100% at 50% 50%, black 40%, transparent 90%);
            -webkit-mask-image: radial-gradient(ellipse 100% 100% at 50% 50%, black 40%, transparent 90%);
            transform: perspective(600px) rotateX(60deg) translateY(-100px) scale(3);
            animation: gridMove 20s linear infinite reverse;
        }
        .dark .spatial-grid {
            background-image: 
                linear-gradient(to right, rgba(245, 158, 11, 0.15) 1px, transparent 1px), 
                linear-gradient(to bottom, rgba(245, 158, 11, 0.15) 1px, transparent 1px);
            filter: drop-shadow(0 0 2px rgba(245, 158, 11, 0.5));
        }
        @keyframes gridMove { 0% { transform: perspective(600px) rotateX(60deg) translateY(0) scale(3); } 100% { transform: perspective(600px) rotateX(60deg) translateY(50px) scale(3); } }

        /* --- SPATIAL ISLAND (Amber Edition) --- */
        .spatial-island {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0.4) 100%);
            backdrop-filter: blur(30px) saturate(200%); -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-top: 1.5px solid rgba(255, 255, 255, 1); border-left: 1.5px solid rgba(255, 255, 255, 0.9); 
            border-right: 1px solid rgba(255, 255, 255, 0.3); border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(245, 158, 11, 0.15), inset 0 0 25px rgba(255, 255, 255, 1);
        }
        .dark .spatial-island {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(2, 6, 23, 0.6) 100%);
            border-top: 1.5px solid rgba(245, 158, 11, 0.5); border-left: 1px solid rgba(245, 158, 11, 0.3); 
            border-right: 1px solid rgba(255, 255, 255, 0.05); border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 2px 20px rgba(245, 158, 11, 0.15);
        }

        .no-transitions * { transition: none !important; animation: none !important; }
    </style>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('satoria_theme') || 'light';
            if (savedTheme === 'dark') { document.documentElement.classList.add('dark'); } 
            else { document.documentElement.classList.remove('dark'); }
        })();
    </script>
</head>
<body id="app-body" class="opacity-0 transition-opacity duration-700 ease-out bg-[#e1e4e7] text-slate-800 dark:bg-slate-950 dark:text-slate-300 h-screen flex overflow-hidden antialiased relative selection:bg-amber-500 selection:text-white">
    
    <div class="spatial-grid"></div>

    <div id="customToast" class="fixed top-5 right-5 z-[100] transform transition-all duration-400 translate-x-[120%] opacity-0 flex items-center p-4 mb-4 text-slate-800 bg-white/90 dark:text-white dark:bg-slate-900/90 backdrop-blur-md rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.1)] dark:shadow-[0_10px_30px_rgba(0,0,0,0.5)] border border-slate-200 dark:border-slate-700/50" role="alert">
        <div id="toastIcon" class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-xl mr-3"></div>
        <div id="toastMessage" class="text-sm font-bold pr-6 font-mono tracking-wide">Notifikasi</div>
        <button type="button" onclick="window.recoveryApp.closeToast()" class="ml-auto -mx-1.5 -my-1.5 bg-white/50 dark:bg-slate-800/50 text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white rounded-lg p-1.5 inline-flex h-8 w-8 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
    </div>

    <div id="app-sidebar" class="z-30 h-full flex-shrink-0 w-[316px] hidden lg:block"></div>

    <main class="relative z-10 flex-1 flex flex-col h-full overflow-hidden">
        
        <div id="app-header"></div>

        <div class="flex-1 overflow-hidden px-3 md:px-6 pb-4 md:pb-6 pt-0 flex flex-col">
            <div class="spatial-island rounded-3xl md:rounded-[2.5rem] flex flex-col flex-1 overflow-hidden relative z-10 border-t-2 border-t-white/80 dark:border-t-amber-500/30">
                
                <div class="px-4 md:px-8 py-4 md:py-5 border-b border-white/50 dark:border-slate-700/50 bg-white/40 dark:bg-slate-900/40 flex justify-between items-center backdrop-blur-md z-10 shadow-sm">
                    <h3 class="text-sm font-bold text-slate-800 dark:text-white uppercase tracking-widest flex items-center font-mono">
                        <span class="w-2 h-8 bg-amber-500 rounded-full mr-3 md:mr-4 shadow-[0_0_10px_#f59e0b] animate-pulse"></span>
                        Arsip Karantina
                    </h3>
                    <div class="flex items-center space-x-2 md:space-x-3 text-[9px] md:text-[10px] font-mono font-bold text-amber-700 dark:text-amber-400 uppercase tracking-widest bg-white/60 dark:bg-amber-950/30 px-3 md:px-5 py-2 md:py-2.5 rounded-xl border border-white dark:border-amber-500/30 shadow-inner">
                        <span class="w-2 h-2 bg-amber-500 rounded-full animate-ping shadow-[0_0_5px_#f59e0b]"></span>
                        <span class="hidden md:inline">Auto-Purge 30 Hari: Aktif</span>
                        <span class="md:hidden">Purge: Aktif</span>
                    </div>
                </div>
                
                <div id="recoveryContainer" class="flex-1 overflow-hidden p-0 relative bg-white/30 dark:bg-transparent"></div>
            </div>
        </div>
    </main>

    <div id="app-modal"></div>

    <script type="module" src="/src/pages/recoveryController.js"></script>
    <script>
        // Membuka 'tirai' layar secara mulus setelah JS dan CSS selesai merakit UI
        window.addEventListener('load', () => {
            setTimeout(() => { 
                document.getElementById('app-body').classList.remove('opacity-0'); 
            }, 150); 
        });
    </script>
</body>
</html>
