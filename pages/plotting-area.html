<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satoria - Spatial Plotting Area</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @custom-variant dark (&:is(.dark *));

        body { font-family: 'Space Grotesk', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        ::-webkit-scrollbar-thumb:hover { background: #0ea5e9; }

        .spatial-grid { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(to right, rgba(14, 165, 233, 0.15) 1px, transparent 1px), linear-gradient(to bottom, rgba(14, 165, 233, 0.15) 1px, transparent 1px); background-size: 50px 50px; mask-image: radial-gradient(ellipse 100% 100% at 50% 50%, black 40%, transparent 90%); -webkit-mask-image: radial-gradient(ellipse 100% 100% at 50% 50%, black 40%, transparent 90%); transform: perspective(600px) rotateX(60deg) translateY(-100px) scale(3); animation: gridMove 15s linear infinite; }
        .dark .spatial-grid { background-image: linear-gradient(to right, rgba(56, 189, 248, 0.15) 1px, transparent 1px), linear-gradient(to bottom, rgba(56, 189, 248, 0.15) 1px, transparent 1px); filter: drop-shadow(0 0 2px rgba(14, 165, 233, 0.5)); }
        @keyframes gridMove { 0% { transform: perspective(600px) rotateX(60deg) translateY(0) scale(3); } 100% { transform: perspective(600px) rotateX(60deg) translateY(50px) scale(3); } }

        .spatial-island { background: linear-gradient(135deg, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0.4) 100%); backdrop-filter: blur(30px) saturate(200%); -webkit-backdrop-filter: blur(30px) saturate(200%); border-top: 1.5px solid rgba(255, 255, 255, 1); border-left: 1.5px solid rgba(255, 255, 255, 0.9); border-right: 1px solid rgba(255, 255, 255, 0.3); border-bottom: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 25px 50px -12px rgba(14, 165, 233, 0.15), inset 0 0 25px rgba(255, 255, 255, 1); }
        .dark .spatial-island { background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(2, 6, 23, 0.6) 100%); border-top: 1.5px solid rgba(14, 165, 233, 0.5); border-left: 1px solid rgba(14, 165, 233, 0.3); border-right: 1px solid rgba(255, 255, 255, 0.05); border-bottom: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 2px 20px rgba(14, 165, 233, 0.15); }

        .dot-matrix { position: absolute; inset: 0; z-index: 0; pointer-events: none; opacity: 0.4; background-image: radial-gradient(rgba(14, 165, 233, 0.3) 1px, transparent 1px); background-size: 16px 16px; mask-image: linear-gradient(to bottom, black 10%, transparent 90%); -webkit-mask-image: linear-gradient(to bottom, black 10%, transparent 90%); }
        .dark .dot-matrix { background-image: radial-gradient(rgba(56, 189, 248, 0.2) 1px, transparent 1px); }

        .holo-nav { position: relative; z-index: 10; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 1rem; overflow: hidden; }
        .holo-bracket { opacity: 0; transform: translateX(-10px); color: #0ea5e9; transition: all 0.3s ease; font-weight: 900; }
        .holo-bracket.right { transform: translateX(10px); }
        .holo-nav:hover .holo-bracket { opacity: 1; transform: translateX(0); }
        .holo-nav.active .holo-bracket { opacity: 1; transform: translateX(0); color: #0284c7; text-shadow: 0 0 8px rgba(14,165,233,0.5); }
        .dark .holo-nav.active .holo-bracket { color: #38bdf8; }
        .holo-nav::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(14, 165, 233, 0.1), transparent); transform: scaleX(0); transform-origin: left; transition: transform 0.4s ease; z-index: -1; }
        .holo-nav:hover::before { transform: scaleX(1); }
        .holo-nav.active { background: rgba(255, 255, 255, 0.6); box-shadow: inset 2px 0 0 #0ea5e9, 0 10px 20px rgba(14, 165, 233, 0.05); }
        .dark .holo-nav.active { background: rgba(14, 165, 233, 0.1); box-shadow: inset 2px 0 0 #38bdf8, 0 10px 20px rgba(0, 0, 0, 0.2); }
        .holo-text { color: #64748b; transition: all 0.3s ease; }
        .dark .holo-text { color: #94a3b8; }
        .holo-nav:hover .holo-text { color: #0284c7; transform: translateX(4px); }
        .holo-nav.active .holo-text { color: #0f172a; transform: translateX(4px); font-weight: 800; }
        .dark .holo-nav:hover .holo-text { color: #38bdf8; }
        .dark .holo-nav.active .holo-text { color: #ffffff; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        .holo-icon { color: #94a3b8; transition: all 0.4s ease; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.05)); }
        .dark .holo-icon { color: #475569; }
        .holo-nav:hover .holo-icon { color: #0ea5e9; transform: scale(1.1) rotate(-5deg); filter: drop-shadow(0 0 5px rgba(14,165,233,0.4)); }
        .holo-nav.active .holo-icon { color: #0284c7; transform: scale(1.1); filter: drop-shadow(0 0 8px rgba(14,165,233,0.5)); }
        .dark .holo-nav.active .holo-icon { color: #38bdf8; }

        .hardware-node { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(255, 255, 255, 1); border-radius: 1.5rem; box-shadow: 0 10px 30px rgba(14, 165, 233, 0.1), inset 0 -2px 10px rgba(14, 165, 233, 0.05); position: relative; overflow: hidden; z-index: 20; }
        .dark .hardware-node { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(56, 189, 248, 0.2); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 -2px 10px rgba(14, 165, 233, 0.1); }
        .hardware-node::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #0ea5e9, transparent); animation: scanNode 4s infinite; opacity: 0.5; }
        @keyframes scanNode { 0% { top: -10%; } 100% { top: 110%; } }

        .glass-input { background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(14, 165, 233, 0.2); backdrop-filter: blur(10px); transition: all 0.3s ease; }
        .dark .glass-input { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(56, 189, 248, 0.2); }
        .glass-input:focus { background: rgba(255, 255, 255, 0.9); border-color: #0ea5e9; box-shadow: 0 0 15px rgba(14, 165, 233, 0.2); }
        .dark .glass-input:focus { background: rgba(2, 6, 23, 0.8); border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }

        .blueprint-canvas { background-color: rgba(248, 250, 252, 0.6); background-image: linear-gradient(rgba(14, 165, 233, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(14, 165, 233, 0.1) 1px, transparent 1px); background-size: 20px 20px; }
        .dark .blueprint-canvas { background-color: rgba(2, 6, 23, 0.6); background-image: linear-gradient(rgba(56, 189, 248, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(56, 189, 248, 0.05) 1px, transparent 1px); }

        .zoom-container { overflow: auto; width: 100%; height: 100%; text-align: center; white-space: nowrap; }
        .zoom-container::before { content: ""; display: inline-block; height: 100%; vertical-align: middle; }
        .img-zoom { display: inline-block; vertical-align: middle; max-width: none; transition: width 0.1s linear, opacity 0.3s ease; filter: drop-shadow(0 10px 30px rgba(0,0,0,0.15)); }
        
        input[type=range] { -webkit-appearance: none; background: rgba(14, 165, 233, 0.2); border-radius: 5px; height: 4px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: #0ea5e9; cursor: pointer; box-shadow: 0 0 10px rgba(14, 165, 233, 0.5); border: 2px solid #fff; transition: transform 0.2s; }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

        .no-transitions * { transition: none !important; animation: none !important; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('satoria_theme') || 'light';
            if (savedTheme === 'dark') { document.documentElement.classList.add('dark'); } 
            else { document.documentElement.classList.remove('dark'); }
        })();
    </script>
</head>
<body id="app-body" class="opacity-0 transition-opacity duration-700 ease-out bg-[#e1e4e7] text-slate-800 dark:bg-slate-950 dark:text-slate-300 h-screen flex overflow-hidden antialiased relative selection:bg-cyan-500 selection:text-white">

        </button>
