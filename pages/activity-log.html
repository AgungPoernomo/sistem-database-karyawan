<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satoria - Log Aktivitas</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #030712; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: rgba(3, 7, 18, 0.8); }
        ::-webkit-scrollbar-thumb { background: #06b6d4; border-radius: 10px; }
        .panel-glass { background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(6, 182, 212, 0.15); }
    </style>
</head>
<body class="text-slate-300 h-screen flex flex-col overflow-hidden antialiased relative">
    <header class="relative z-10 h-20 flex items-center justify-between px-8 border-b border-cyan-500/20 panel-glass flex-shrink-0">
        <div class="flex items-center">
            <button onclick="window.location.href='/pages/dashboard.html'" class="mr-6 p-2 rounded-xl bg-slate-900/50 text-cyan-500 hover:text-cyan-300 hover:bg-cyan-500/10 border border-cyan-500/20 transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div>
                <h2 class="text-2xl font-bold text-white tracking-tight uppercase">System Audit Log</h2>
                <p class="text-xs font-mono text-cyan-500/70 mt-1 uppercase tracking-widest">Catatan Operasional Real-Time</p>
            </div>
        </div>
    </header>

    <main class="relative z-10 flex-1 overflow-hidden p-8 flex flex-col">
        <div class="panel-glass rounded-2xl flex flex-col flex-1 overflow-hidden shadow-[0_0_30px_rgba(0,0,0,0.3)]">
            <div id="logContainer" class="flex-1 overflow-auto p-0 relative custom-scrollbar">
                 <div class="p-8 h-full flex items-center justify-center text-cyan-400 font-mono animate-pulse">Memuat Jaringan Log...</div>
            </div>
        </div>
    </main>

    <script type="module" src="/src/js/activity.js"></script>
</body>
</html>
