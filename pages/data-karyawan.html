<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satoria - Database Personil</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    
    <!-- LIBRARY UNTUK EXPORT EXCEL & PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style type="text/tailwindcss">
        @custom-variant dark (&:is(.dark *));

        body { font-family: 'Space Grotesk', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        ::-webkit-scrollbar-thumb:hover { background: #0ea5e9; }

        /* --- SPATIAL GRID BACKGROUND --- */
        .spatial-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: 
                linear-gradient(to right, rgba(14, 165, 233, 0.15) 1px, transparent 1px), 
                linear-gradient(to bottom, rgba(14, 165, 233, 0.15) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(ellipse 100% 100% at 50% 50%, black 40%, transparent 90%);
            -webkit-mask-image: radial-gradient(ellipse 100% 100% at 50% 50%, black 40%, transparent 90%);
            transform: perspective(600px) rotateX(60deg) translateY(-100px) scale(3);
            animation: gridMove 15s linear infinite;
        }
        .dark .spatial-grid {
            background-image: 
                linear-gradient(to right, rgba(56, 189, 248, 0.15) 1px, transparent 1px), 
                linear-gradient(to bottom, rgba(56, 189, 248, 0.15) 1px, transparent 1px);
            filter: drop-shadow(0 0 2px rgba(14, 165, 233, 0.5));
        }
        @keyframes gridMove {
            0% { transform: perspective(600px) rotateX(60deg) translateY(0) scale(3); }
            100% { transform: perspective(600px) rotateX(60deg) translateY(50px) scale(3); }
        }

        /* --- SPATIAL ISLAND --- */
        .spatial-island {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0.4) 100%);
            backdrop-filter: blur(30px) saturate(200%); -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-top: 1.5px solid rgba(255, 255, 255, 1); border-left: 1.5px solid rgba(255, 255, 255, 0.9); 
            border-right: 1px solid rgba(255, 255, 255, 0.3); border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(14, 165, 233, 0.15), inset 0 0 25px rgba(255, 255, 255, 1);
        }
        .dark .spatial-island {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(2, 6, 23, 0.6) 100%);
            border-top: 1.5px solid rgba(14, 165, 233, 0.5); border-left: 1px solid rgba(14, 165, 233, 0.3); 
            border-right: 1px solid rgba(255, 255, 255, 0.05); border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 2px 20px rgba(14, 165, 233, 0.15);
        }

        /* --- KACA INPUT FORM --- */
        .glass-input {
            background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(14, 165, 233, 0.2);
            backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .dark .glass-input { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(56, 189, 248, 0.2); }
        .glass-input:focus { background: rgba(255, 255, 255, 0.9); border-color: #0ea5e9; box-shadow: 0 0 15px rgba(14, 165, 233, 0.2); }
        .dark .glass-input:focus { background: rgba(2, 6, 23, 0.8); border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }

        .no-transitions * { transition: none !important; animation: none !important; }
    </style>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('satoria_theme') || 'light';
            if (savedTheme === 'dark') { document.documentElement.classList.add('dark'); } 
            else { document.documentElement.classList.remove('dark'); }
        })();
    </script>
</head>
<body id="app-body" class="bg-[#e1e4e7] text-slate-800 dark:bg-slate-950 dark:text-slate-300 h-screen flex overflow-hidden antialiased relative selection:bg-cyan-500 selection:text-white">    
    <div class="spatial-grid"></div>

    <div id="customToast" class="fixed top-5 right-5 z-[100] transform transition-all duration-400 translate-x-[120%] opacity-0 flex items-center p-4 mb-4 text-slate-800 bg-white/90 dark:text-white dark:bg-slate-900/90 backdrop-blur-md rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.1)] dark:shadow-[0_10px_30px_rgba(0,0,0,0.5)] border border-white dark:border-slate-700/50" role="alert">
        <div id="toastIcon" class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-xl mr-3"></div>
        <div id="toastMessage" class="text-sm font-bold pr-6 font-mono tracking-wide">Notifikasi</div>
        <button type="button" onclick="window.dataKaryawanApp.closeToast()" class="ml-auto -mx-1.5 -my-1.5 bg-white/50 dark:bg-slate-800/50 text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white rounded-lg p-1.5 inline-flex h-8 w-8 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
    </div>

    <div id="app-sidebar" class="z-30 h-full flex-shrink-0 w-[316px] hidden lg:block"></div>

    <main class="relative z-10 flex-1 flex flex-col h-full overflow-hidden">
        
        <div id="app-header"></div>

        <div class="flex-1 overflow-hidden px-3 md:px-6 pb-4 md:pb-6 pt-2 flex flex-col gap-4 md:gap-6">
            
            <div class="spatial-island p-3 md:p-4 rounded-3xl md:rounded-[2rem] flex flex-col md:flex-row flex-wrap items-center gap-2 md:gap-3 z-20 relative">
                <div class="relative w-full md:flex-1 min-w-[200px] font-mono group">
                    <input type="text" id="searchInput" placeholder="Scan ID / Nama..." class="w-full pl-11 pr-4 py-3 rounded-2xl text-sm font-bold placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none transition-all glass-input">
                    <svg class="w-5 h-5 text-slate-400 group-hover:text-cyan-500 absolute left-4 top-3.5 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>

                <div class="grid grid-cols-2 lg:flex lg:flex-wrap gap-2 w-full md:w-auto">
                    <select id="filterDept" class="px-2 lg:px-4 py-3 rounded-2xl text-[10px] lg:text-xs font-bold uppercase tracking-widest text-cyan-700 dark:text-cyan-400 focus:outline-none transition-all glass-input cursor-pointer appearance-none"><option value="Semua">DEPT</option></select>
                    <select id="filterGender" class="px-2 lg:px-4 py-3 rounded-2xl text-[10px] lg:text-xs font-bold uppercase tracking-widest text-cyan-700 dark:text-cyan-400 focus:outline-none transition-all glass-input cursor-pointer appearance-none"><option value="Semua">GENDER</option></select>
                    <select id="filterPlant" class="px-2 lg:px-4 py-3 rounded-2xl text-[10px] lg:text-xs font-bold uppercase tracking-widest text-cyan-700 dark:text-cyan-400 focus:outline-none transition-all glass-input cursor-pointer appearance-none"><option value="Semua">PLANT</option></select>
                    <select id="filterGroup" class="px-2 lg:px-4 py-3 rounded-2xl text-[10px] lg:text-xs font-bold uppercase tracking-widest text-cyan-700 dark:text-cyan-400 focus:outline-none transition-all glass-input cursor-pointer appearance-none"><option value="Semua">GRUP</option></select>
                    <select id="filterArea" class="px-2 lg:px-4 py-3 rounded-2xl text-[10px] lg:text-xs font-bold uppercase tracking-widest text-cyan-700 dark:text-cyan-400 focus:outline-none transition-all glass-input cursor-pointer appearance-none"><option value="Semua">AREA</option></select>
                    <select id="filterZone" class="px-2 lg:px-4 py-3 rounded-2xl text-[10px] lg:text-xs font-bold uppercase tracking-widest text-cyan-700 dark:text-cyan-400 focus:outline-none transition-all glass-input cursor-pointer appearance-none"><option value="Semua">ZONE</option></select>
                </div>
                
                <div class="flex space-x-2 w-full md:w-auto mt-2 md:mt-0">
                    <button id="resetFilterBtn" class="flex-1 md:flex-none p-3 rounded-2xl bg-rose-500/10 text-rose-500 border border-rose-500/30 hover:bg-rose-500 hover:text-white transition-all hidden justify-center" title="Reset Filter">
                        <svg class="w-5 h-5 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                    
                    <button id="openAddModalBtn" class="flex-1 md:flex-none justify-center bg-cyan-600 hover:bg-cyan-500 text-white px-5 py-3 rounded-2xl text-[10px] lg:text-xs font-bold font-mono uppercase tracking-widest shadow-[0_5px_15px_rgba(14,165,233,0.3)] transition-all flex items-center hover:-translate-y-1">
                        <svg class="w-4 h-4 md:mr-2" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg> 
                        <span class="hidden md:inline">Tambah Data Karyawan</span><span class="md:hidden ml-1">Tambah</span>
                    </button>
                </div>
            </div>

            <div class="spatial-island rounded-3xl md:rounded-[2.5rem] flex flex-col flex-1 overflow-hidden relative z-10 border-t-2 border-t-white/80 dark:border-t-cyan-400/30 mb-2">
                <div class="px-4 md:px-8 py-4 md:py-5 border-b border-white/50 dark:border-slate-800/80 bg-white/40 dark:bg-slate-900/40 backdrop-blur-md flex flex-col lg:flex-row lg:justify-between items-start lg:items-center gap-3 z-10 shadow-sm">
                    <h3 class="text-sm font-bold text-slate-800 dark:text-white uppercase tracking-widest flex items-center font-mono">
                        <span class="w-2 h-8 bg-cyan-500 rounded-full mr-3 md:mr-4 shadow-[0_0_10px_rgba(14,165,233,0.5)]"></span> Entri Database
                    </h3>
                    <div class="flex items-center space-x-2 md:space-x-4 w-full lg:w-auto overflow-x-auto custom-scrollbar pb-1 lg:pb-0">
                        <div class="flex items-center space-x-2 mr-2 border-r border-slate-300 dark:border-slate-700 pr-3 md:pr-4 flex-shrink-0">
                            <button id="exportExcelBtn" class="bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 hover:bg-emerald-500 hover:text-white px-3 py-1.5 rounded-xl border border-emerald-500/30 transition-all font-mono text-[10px] font-bold tracking-widest flex items-center">
                                <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg> EXCEL
                            </button>
                            <button id="exportPdfBtn" class="bg-rose-500/10 text-rose-600 dark:text-rose-400 hover:bg-rose-500 hover:text-white px-3 py-1.5 rounded-xl border border-rose-500/30 transition-all font-mono text-[10px] font-bold tracking-widest flex items-center">
                                <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg> PDF
                            </button>
                        </div>

                        <span id="filterBadge" class="text-[9px] bg-cyan-500/20 text-cyan-700 dark:text-cyan-400 px-3 py-1.5 rounded-xl border border-cyan-500/30 tracking-widest hidden font-bold font-mono flex-shrink-0"></span>
                        <div class="flex items-center space-x-2 md:space-x-3 bg-white/60 dark:bg-slate-950/60 px-3 md:px-4 py-1.5 rounded-xl border border-white/80 dark:border-cyan-500/20 shadow-inner flex-shrink-0">
                            <span class="text-[9px] font-mono text-slate-500 dark:text-slate-400 uppercase tracking-widest font-bold">Total</span>
                            <span id="rowCount" class="text-cyan-600 dark:text-cyan-400 text-xs font-black font-mono ml-1 md:ml-2">0</span>
                        </div>
                    </div>
                </div>
                
                <div id="tableContainer" class="flex-1 overflow-hidden p-0 relative bg-white/30 dark:bg-transparent"></div>
            </div>
        </div>
    </main>
    
    <div id="app-modal"></div>

    <script type="module" src="/src/pages/dataKaryawanController.js"></script>
</body>
</html>
