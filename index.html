<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Satoria - Database System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    
    <style>
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #030712; 
            overflow: hidden;
        }
        
        /* EFEK 3D GRID BERGERAK */
        .grid-container {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            perspective: 1000px;
            overflow: hidden;
            z-index: 0;
        }

        .moving-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            bottom: -50%;
            left: -50%;
            background-image: 
                linear-gradient(rgba(6, 182, 212, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.2) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: rotateX(60deg) translateY(0);
            animation: gridMove 3s linear infinite;
            -webkit-mask-image: linear-gradient(to bottom, transparent 10%, black 70%);
            mask-image: linear-gradient(to bottom, transparent 10%, black 70%);
        }

        @keyframes gridMove {
            0% { transform: rotateX(60deg) translateY(0); }
            100% { transform: rotateX(60deg) translateY(60px); }
        }

        /* Animasi Orb Bercahaya */
        .neon-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            animation: pulseOrb 6s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes pulseOrb {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 0.9; }
        }

        /* Efek Kaca Premium */
        .crypto-glass {
            background: rgba(3, 7, 18, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(6, 182, 212, 0.2);
            box-shadow: 0 0 50px rgba(6, 182, 212, 0.15), inset 0 0 20px rgba(6, 182, 212, 0.05);
            position: relative;
        }
        
        /* Garis Scanline */
        .crypto-glass::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 2px;
            background: linear-gradient(90deg, transparent, #06b6d4, transparent);
            animation: scanline 3s linear infinite;
        }

        @keyframes scanline {
            0% { left: -100%; }
            100% { left: 200%; }
        }

/* SIHIR CSS UNTUK LOGO PERUSAHAAN ANDA */
        .company-logo-glow {
            /* Menampilkan warna asli logo perusahaan dan menambahkan efek neon glow */
            filter: drop-shadow(0 0 12px rgba(34, 211, 238, 0.5));
            transition: all 0.3s ease;
        }
        
        .group:hover .company-logo-glow {
            /* Efek glow bertambah saat di-hover, warna asli tetap terjaga */
            filter: drop-shadow(0 0 20px rgba(34, 211, 238, 0.9));
            transform: scale(1.05);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative selection:bg-cyan-500 selection:text-black antialiased">

    <div class="grid-container pointer-events-none">
        <div class="moving-grid"></div>
    </div>
    
    <div class="neon-orb w-[500px] h-[500px] bg-cyan-600/30 top-[-100px] right-[-100px]"></div>
    <div class="neon-orb w-[600px] h-[600px] bg-indigo-700/20 bottom-[-200px] left-[-150px]" style="animation-delay: -3s;"></div>

    <div class="relative z-10 w-full max-w-lg p-6 mt-8">
        
<div class="text-center mb-10 flex flex-col items-center">
            
            <div class="inline-flex items-center justify-center w-56 h-16 rounded-xl bg-slate-950 border border-cyan-500/30 shadow-[0_0_30px_rgba(6,182,212,0.4)] mb-5 relative group">
                <div class="absolute inset-0 rounded-xl bg-cyan-500/10 group-hover:bg-cyan-500/30 transition-all duration-500 animate-pulse"></div>
                
                <img src="/src/assets/logo-satoria.png" alt="Satoria Logo" class="h-10 w-auto max-w-[180px] object-contain relative z-10 company-logo-glow" onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'180\' height=\'40\'><text x=\'50%\' y=\'50%\' font-family=\'sans-serif\' font-size=\'20\' font-weight=\'bold\' tracking=\'widest\' fill=\'white\' text-anchor=\'middle\' dominant-baseline=\'middle\'>SATORIA</text></svg>'">
            </div>

            <h1 class="text-4xl font-bold text-white tracking-tighter mb-2 drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]">DATABASE<span class="text-cyan-400"> SYSTEM</span></h1>
            
            <p class="text-cyan-500/80 font-semibold tracking-widest text-sm uppercase">Sistem Tata Kelola Data Karyawan</p>
        </div>

        <div class="crypto-glass rounded-3xl p-8 sm:p-10">
            <form id="loginForm" class="space-y-6">
                
                <div class="space-y-2 group">
                    <label for="userId" class="text-xs font-bold text-slate-400 uppercase tracking-widest">ID Karyawan</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-500 group-focus-within:text-cyan-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <input type="text" id="userId" required placeholder="Masukkan ID Anda" autocomplete="off" 
                            class="w-full pl-12 pr-4 py-4 bg-slate-900/80 border border-slate-700/50 rounded-xl text-cyan-50 placeholder-slate-600 focus:outline-none focus:ring-1 focus:ring-cyan-500 focus:border-cyan-500 transition-all duration-300 font-mono shadow-inner" />
                    </div>
                </div>
                
                <div class="space-y-2 group">
                    <div class="flex items-center justify-between">
                        <label for="password" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Kata Sandi</label>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-500 group-focus-within:text-cyan-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="w-full pl-12 pr-4 py-4 bg-slate-900/80 border border-slate-700/50 rounded-xl text-cyan-50 placeholder-slate-600 focus:outline-none focus:ring-1 focus:ring-cyan-500 focus:border-cyan-500 transition-all duration-300 font-mono shadow-inner" />
                    </div>
                </div>

                <button type="submit" id="loginBtn" 
                    class="w-full py-4 px-4 mt-6 bg-cyan-500 text-slate-950 font-bold tracking-wider uppercase rounded-xl shadow-[0_0_20px_rgba(6,182,212,0.4)] hover:shadow-[0_0_35px_rgba(6,182,212,0.8)] hover:bg-cyan-400 transform transition-all duration-300 active:scale-[0.98] flex justify-center items-center group relative overflow-hidden">
                    <span class="relative z-10">Otorisasi Akses</span>
                    <svg class="w-5 h-5 ml-2 group-hover:translate-x-1 transition-transform relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                    </svg>
                </button>
                
                <p id="errorMessage" class="text-rose-500 text-sm font-semibold text-center min-h-[20px] mt-4 drop-shadow-md"></p>
            </form>
        </div>
        
        <div class="mt-8 text-center font-mono space-y-2">
            <p class="text-slate-500 text-[11px] uppercase tracking-[0.2em]">
                Satoria Aneka Industri &copy; 2026
            </p>
            <div class="flex items-center justify-center space-x-3 text-cyan-600/60 text-[10px] uppercase tracking-widest">
                <span>V.2.0.4</span>
                <span class="w-1 h-1 bg-cyan-600/60 rounded-full"></span>
                <span class="flex items-center"><svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg> End-to-End Encrypted</span>
                <span class="w-1 h-1 bg-cyan-600/60 rounded-full"></span>
                <span class="flex items-center"><span class="w-1.5 h-1.5 bg-cyan-400 rounded-full mr-1.5 animate-pulse"></span> Network Active</span>
            </div>
        </div>

    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
